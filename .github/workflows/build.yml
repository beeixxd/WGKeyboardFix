name: Build WGKeyboardFix dylib

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - run: |
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-path

      - run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          clang -dynamiclib -arch arm64 -miphoneos-version-min=13.0 \
            -isysroot "$SDK" \
            -framework UIKit -framework Foundation \
            -o WGKeyboardFix.dylib WGKeyboardFix.m
          codesign -s - WGKeyboardFix.dylib
          file WGKeyboardFix.dylib

      - uses: actions/upload-artifact@v4
        with:
          name: WGKeyboardFix-dylib
          path: WGKeyboardFix.dylib

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: WGKeyboardFix build ${{ github.run_number }}
          files: WGKeyboardFix.dylib
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
