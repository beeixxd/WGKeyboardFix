name: Build WGEKeyboardFix dylib

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - run: |
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-path

      - run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          clang -dynamiclib -arch arm64 -miphoneos-version-min=13.0 \
            -isysroot "$SDK" \
            -framework UIKit -framework Foundation \
            -o WGEKeyboardFix.dylib WGEKeyboardFix.m
          codesign -s - WGEKeyboardFix.dylib
          file WGEKeyboardFix.dylib

      - uses: actions/upload-artifact@v4
        with:
          name: WGEKeyboardFix-dylib
          path: WGEKeyboardFix.dylib

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: WGEKeyboardFix build ${{ github.run_number }}
          files: WGEKeyboardFix.dylib
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
