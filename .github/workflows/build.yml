name: Build WGKeyboardFix dylib

on:
  workflow_dispatch:   # 手动点 "Run workflow" 触发

jobs:
  build:
    runs-on: macos-14   # GitHub 提供的云端 Mac，自带 Xcode + iOS SDK

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode / SDK info (方便排查问题)
        run: |
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-path

      - name: Build arm64 dylib
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          clang -dynamiclib -arch arm64 -miphoneos-version-min=13.0 \
            -isysroot "$SDK" \
            -framework UIKit -framework Foundation \
            -o WGKeyboardFix.dylib WGKeyboardFix.m
          codesign -s - WGKeyboardFix.dylib
          file WGKeyboardFix.dylib

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WGKeyboardFix-dylib
          path: WGKeyboardFix.dylib
